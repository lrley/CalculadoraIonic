<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>
      Primera APP-IONIC
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card>
    <ion-card-header>
      <ion-card-title>Calculadora</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-card color="light" class="pantalla-container">
        <ion-card-content class="text-end">
          <h1 class="pantalla-texto">{{ pantalla }}</h1>
        </ion-card-content>
      </ion-card>

      <ion-grid>
        <ion-row>
          <ion-col size="9">
            <ion-button expand="block" color="danger" (click)="limpiar()">C</ion-button>
          </ion-col>
          <ion-col size="3">
            <ion-button expand="block" color="warning" (click)="presionarOperador('/')">/</ion-button>
          </ion-col>
        </ion-row>

        <ion-row>
          <ion-col size="3"><ion-button expand="block" color="medium" (click)="presionarNumero('7')">7</ion-button></ion-col>
          <ion-col size="3"><ion-button expand="block" color="medium" (click)="presionarNumero('8')">8</ion-button></ion-col>
          <ion-col size="3"><ion-button expand="block" color="medium" (click)="presionarNumero('9')">9</ion-button></ion-col>
          <ion-col size="3"><ion-button expand="block" color="warning" (click)="presionarOperador('*')">×</ion-button></ion-col>
        </ion-row>

        <ion-row>
          <ion-col size="3"><ion-button expand="block" color="medium" (click)="presionarNumero('4')">4</ion-button></ion-col>
          <ion-col size="3"><ion-button expand="block" color="medium" (click)="presionarNumero('5')">5</ion-button></ion-col>
          <ion-col size="3"><ion-button expand="block" color="medium" (click)="presionarNumero('6')">6</ion-button></ion-col>
          <ion-col size="3"><ion-button expand="block" color="warning" (click)="presionarOperador('-')">-</ion-button></ion-col>
        </ion-row>

        <ion-row>
          <ion-col size="3"><ion-button expand="block" color="medium" (click)="presionarNumero('1')">1</ion-button></ion-col>
          <ion-col size="3"><ion-button expand="block" color="medium" (click)="presionarNumero('2')">2</ion-button></ion-col>
          <ion-col size="3"><ion-button expand="block" color="medium" (click)="presionarNumero('3')">3</ion-button></ion-col>
          <ion-col size="3"><ion-button expand="block" color="warning" (click)="presionarOperador('+')">+</ion-button></ion-col>
        </ion-row>

        <ion-row>
          <ion-col size="6">
            <ion-button expand="block" color="medium" (click)="presionarNumero('0')">0</ion-button>
          </ion-col>
          <ion-col size="3">
            <ion-button expand="block" color="medium" (click)="presionarNumero('.')">.</ion-button>
          </ion-col>
          <ion-col size="3">
            <ion-button expand="block" color="success" (click)="calcular()">=</ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card-content>
  </ion-card>

</ion-content>
